<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panini FIFA World Cup 2026 — Sticker Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; font-size: 13px; background: #f0f2f5; color: #222; }

  header { background: #1a1a2e; color: #fff; padding: 18px 24px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 18px; font-weight: 700; }
  header .subtitle { font-size: 12px; color: #aaa; margin-top: 2px; }
  .header-stats { margin-left: auto; text-align: right; }
  .header-stats .stat { font-size: 22px; font-weight: 700; color: #4fc3f7; }
  .header-stats .stat-label { font-size: 11px; color: #aaa; }

  .controls { background: #fff; padding: 10px 20px; border-bottom: 1px solid #ddd; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .controls input { padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; width: 200px; }
  .tab-btn { padding: 6px 14px; border: 1px solid #ccc; border-radius: 20px; background: #fff; cursor: pointer; font-size: 12px; transition: all 0.15s; }
  .tab-btn.active { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }
  .tab-btn:hover:not(.active) { background: #eee; }
  .sort-btn { padding: 6px 14px; border: 1px solid #ccc; border-radius: 4px; background: #fff; cursor: pointer; font-size: 12px; }
  .sort-btn:hover { background: #eee; }
  .col-btn { padding: 6px 12px; border: 1px solid #ccc; border-radius: 20px; background: #fff; cursor: pointer; font-size: 12px; transition: all 0.15s; }
  .col-btn.active { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }
  .col-btn:hover:not(.active) { background: #eee; }
  label { font-size: 12px; color: #555; }

  .main { display: flex; gap: 0; height: calc(100vh - 110px); }

  /* Summary panel */
  .summary-panel { width: 510px; min-width: 400px; overflow-y: auto; background: #fff; border-right: 1px solid #ddd; }
  .summary-header { display: grid; grid-template-columns: 1fr 44px 44px 44px 86px 86px; gap: 0; padding: 8px 12px; background: #1a1a2e; color: #fff; font-size: 11px; font-weight: 600; position: sticky; top: 0; z-index: 10; }
  .summary-header span:not(:first-child) { text-align: center; }

  .team-row { display: grid; grid-template-columns: 1fr 44px 44px 44px 86px 86px; gap: 0; padding: 7px 12px; border-bottom: 1px solid #f0f0f0; cursor: pointer; align-items: center; transition: background 0.1s; }
  .team-row:hover { background: #f0f7ff; }
  .team-row.active { background: #e3f2fd; border-left: 3px solid #1565c0; padding-left: 9px; }
  .team-name { font-size: 12px; font-weight: 500; color: #1a1a2e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .team-row.active .team-name { color: #0d47a1; }
  .team-count { text-align: center; font-size: 12px; }
  .team-count.us { color: #1565c0; font-weight: 600; }
  .team-count.mx { color: #006847; font-weight: 600; }
  .progress-wrap { display: flex; align-items: center; gap: 5px; }
  .progress-bar { flex: 1; height: 8px; background: #e0e0e0; border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #42a5f5, #1565c0); border-radius: 4px; transition: width 0.3s; }
  .progress-fill.low { background: linear-gradient(90deg, #ef9a9a, #c62828); }
  .progress-fill.mid { background: linear-gradient(90deg, #ffcc80, #f57c00); }
  .pct-text { font-size: 10px; color: #888; width: 28px; text-align: right; }
  .progress-wrap.mx-bar { border-left: 2px solid #ddd; margin-left: 6px; padding-left: 6px; }

  .progress-fill.mx { background: linear-gradient(90deg, #4caf7d, #006847); }

  .grand-total { display: grid; grid-template-columns: 1fr 44px 44px 44px 86px 86px; gap: 0; padding: 8px 12px; background: #1a1a2e; color: #fff; font-size: 12px; font-weight: 700; position: sticky; bottom: 0; }
  .grand-total span:not(:first-child) { text-align: center; }

  /* Detail panel */
  .detail-panel { flex: 1; overflow-y: auto; padding: 0; background: #f8f9fa; }
  .detail-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #aaa; font-size: 14px; gap: 8px; }
  .detail-empty .arrow { font-size: 32px; }

  .detail-header { background: #1565c0; color: #fff; padding: 14px 20px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 5; }
  .detail-header h2 { font-size: 15px; font-weight: 700; }
  .detail-stats { display: flex; gap: 20px; margin-left: auto; }
  .detail-stat { text-align: center; }
  .detail-stat .val { font-size: 18px; font-weight: 700; }
  .detail-stat .lbl { font-size: 10px; color: rgba(255,255,255,0.7); }

  .sticker-grid { padding: 16px 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 8px; }

  .sticker-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 6px; padding: 10px 12px; display: flex; align-items: center; gap: 10px; cursor: default; }
  .sticker-card.collected-us { border-color: #90caf9; background: #e3f2fd; }
  .sticker-card.collected-mx { border-color: #a5d6a7; background: #e8f5e9; }
  .sticker-card.collected-both { border-color: #ef9a9a; background: #ffebee; }

  .sticker-num { font-size: 11px; font-weight: 700; color: #888; min-width: 40px; }
  .sticker-desc { font-size: 12px; flex: 1; line-height: 1.3; }
  .sticker-badges { display: flex; gap: 4px; flex-direction: column; align-items: flex-end; }
  .badge { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 3px; }
  .badge.us { background: #bbdefb; color: #1565c0; }
  .badge.us.have { background: #1565c0; color: #fff; }
  .badge.mx { background: #c8e6c9; color: #2e7d32; }
  .badge.mx.have { background: #2e7d32; color: #fff; }


  .sticker-thumb { width: 36px; height: 36px; border-radius: 4px; object-fit: cover; border: 1px solid #ddd; flex-shrink: 0; }
  .section-divider { padding: 10px 20px 4px; font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
</style>
</head>

<header>

  </div>

<div class="controls">

  <button class="tab-btn" id="tab-missing" onclick="setView('missing')">Has Missing</button>
  <button class="tab-btn" id="tab-complete" onclick="setView('complete')">Complete</button>

  <button class="tab-btn" id="tab-coca" onclick="setView('coca')">🥤 Coca Cola</button>
  <select class="sort-btn" id="sortSelect" onchange="renderSummary()">

    <option value="pct-us-desc">Sort: US % ↓</option>

    <option value="missing-us">Sort: US Missing ↓</option>
    <option value="missing-mx">Sort: MX Missing ↓</option>
  </select>

  <label><input type="checkbox" id="showBothOnly" onchange="renderSummary()"> Only show teams where both have stickers</label>
  <div style="margin-left:auto;display:flex;gap:6px;align-items:center">
    <span style="font-size:11px;color:#888;">Show:</span>
    <button class="col-btn active" id="col-both" onclick="setCollection('both')">🇺🇸 + 🇲🇽</button>
    <button class="col-btn" id="col-us" onclick="setCollection('us')">🇺🇸 US only</button>
    <button class="col-btn" id="col-mx" onclick="setCollection('mx')">🇲🇽 MX only</button>
  </div>
</div>

<div id="dupesPage" style="display:none;padding:24px;overflow-y:auto;height:calc(100vh - 110px);background:#f8f9fa;">
  <div id="dupesContent"></div>
</div>
<div id="cocaPage" style="display:none;padding:24px;overflow-y:auto;height:calc(100vh - 110px);background:#f8f9fa;">
  <div id="cocaContent"></div>
</div>
<div class="main" id="mainPage">
  <div class="summary-panel">
    <div class="summary-header" id="summaryHeader">
      <span>Team</span><span>Total</span><span>🇺🇸</span><span>🇲🇽</span><span>🇺🇸 Progress</span><span>🇲🇽 Progress</span>
    </div>
    <div id="summaryList"></div>
    <div class="grand-total" id="grandTotal"></div>
  </div>
  <div class="detail-panel" id="detailPanel">
    <div class="detail-empty">
      <div class="arrow">←</div>
      <div>Click a team to see sticker details</div>
    </div>
  </div>
</div>

function updateSortOptions() {
  const sel = document.getElementById('sortSelect');
  const cur = sel.value;
  const col = currentCollection;
  if (col === 'both') {
    sel.innerHTML = `
      <option value="alpha">Sort: A–Z</option>
      <option value="pct-us-desc">Sort: 🇺🇸 % ↓</option>
      <option value="pct-mx-desc">Sort: 🇲🇽 % ↓</option>
      <option value="missing-us">Sort: 🇺🇸 Missing ↓</option>
      <option value="missing-mx">Sort: 🇲🇽 Missing ↓</option>`;
  } else {
    const flag = col === 'us' ? '🇺🇸' : '🇲🇽';
    sel.innerHTML = `
      <option value="alpha">Sort: A–Z</option>
      <option value="pct-active">Sort: ${flag} % ↓</option>
      <option value="missing-active">Sort: ${flag} Missing ↓</option>`;
  }
  // restore selection if still valid, else reset to alpha
  if ([...sel.options].some(o => o.value === cur)) sel.value = cur;
}

function setCollection(c) {
  currentCollection = c;
  document.querySelectorAll('.col-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('col-' + c).classList.add('active');
  updateSortOptions();
  if (currentView === 'dupes') { renderDupes(); return; }
  renderSummary();
  if (activeSection) showDetail(activeSection);
}

function getStats(sec) {
  const items = sections[sec] || [];
  const total = items.length;
  const us = items.filter(s => s.usa).length;
  const mx = items.filter(s => s.mx).length;
  return { total, us, mx };
}

function setView(v) {
  currentView = v;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + v).classList.add('active');
  const isDupes = v === 'dupes';
  const isCoca  = v === 'coca';
  document.getElementById('dupesPage').style.display = isDupes ? 'block' : 'none';
  document.getElementById('cocaPage').style.display  = isCoca  ? 'block' : 'none';
  document.getElementById('mainPage').style.display  = (!isDupes && !isCoca) ? 'flex' : 'none';
  if (isDupes) { renderDupes(); } else if (isCoca) { renderCoca(); } else { renderSummary(); if (activeSection) showDetail(activeSection); }
}

function filterTeams() { renderSummary(); }

function renderSummary() {
  const search = document.getElementById('searchBox').value.toLowerCase();
  const sort = document.getElementById('sortSelect').value;
  const bothOnly = document.getElementById('showBothOnly').checked;

  let rows = sectionOrder.map(sec => ({ sec, ...getStats(sec) }));


  const col = currentCollection;

  // Filter
  if (search) rows = rows.filter(r => r.sec.toLowerCase().includes(search));
  if (currentView === 'missing') rows = rows.filter(r => col === 'mx' ? r.mx < r.total : col === 'us' ? r.us < r.total : r.us < r.total || r.mx < r.total);
  if (currentView === 'complete') rows = rows.filter(r => col === 'mx' ? r.mx === r.total : col === 'us' ? r.us === r.total : r.us === r.total && r.mx === r.total);
  if (bothOnly) rows = rows.filter(r => r.us > 0 && r.mx > 0);

  // Sort
  const useFn  = r => r.us / r.total;
  const mxFn   = r => r.mx / r.total;
  const actFn  = col === 'mx' ? mxFn : useFn;
  if (sort === 'alpha') rows.sort((a,b) => a.sec.localeCompare(b.sec));
  else if (sort === 'pct-us-desc')    rows.sort((a,b) => useFn(b) - useFn(a));
  else if (sort === 'pct-mx-desc')    rows.sort((a,b) => mxFn(b) - mxFn(a));
  else if (sort === 'pct-active')     rows.sort((a,b) => actFn(b) - actFn(a));
  else if (sort === 'missing-us')     rows.sort((a,b) => (b.total-b.us) - (a.total-a.us));
  else if (sort === 'missing-mx')     rows.sort((a,b) => (b.total-b.mx) - (a.total-a.mx));
  else if (sort === 'missing-active') rows.sort((a,b) => col === 'mx' ? (b.total-b.mx)-(a.total-a.mx) : (b.total-b.us)-(a.total-a.us));

  // Update header columns
  const grid = col === 'both' ? GRID_BOTH : GRID_ONE;
  const header = document.getElementById('summaryHeader');
  header.style.gridTemplateColumns = grid;
  if (col === 'both') header.innerHTML = `<span>Team</span><span>Total</span><span>🇺🇸</span><span>🇲🇽</span><span>🇺🇸 Progress</span><span>🇲🇽 Progress</span>`;
  else if (col === 'us') header.innerHTML = `<span>Team</span><span>Total</span><span>🇺🇸</span><span>🇺🇸 Progress</span>`;
  else header.innerHTML = `<span>Team</span><span>Total</span><span>🇲🇽</span><span>🇲🇽 Progress</span>`;

  const list = document.getElementById('summaryList');
  list.innerHTML = rows.map(r => {
    const isActive = r.sec === activeSection;
    const pctUs = r.total ? r.us / r.total : 0;
    const pctMx = r.total ? r.mx / r.total : 0;
    const pct = col === 'mx' ? pctMx : pctUs;
    const pctClass = col === 'mx' ? 'mx' : pct >= 0.7 ? '' : pct >= 0.35 ? 'mid' : 'low';
    const count = col === 'mx' ? r.mx : r.us;

    const bothCols = col === 'both' ? `
      <div class="team-count us">${r.us}</div>
      <div class="team-count mx">${r.mx}</div>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill ${pctUs >= 0.7 ? '' : pctUs >= 0.35 ? 'mid' : 'low'}" style="width:${(pctUs*100).toFixed(1)}%"></div></div>
        <span class="pct-text">${(pctUs*100).toFixed(0)}%</span>
      </div>
      <div class="progress-wrap mx-bar">
        <div class="progress-bar"><div class="progress-fill mx" style="width:${(pctMx*100).toFixed(1)}%"></div></div>
        <span class="pct-text">${(pctMx*100).toFixed(0)}%</span>
      </div>` : `
      <div class="team-count ${col}">${count}</div>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill ${pctClass}" style="width:${(pct*100).toFixed(1)}%"></div></div>
        <span class="pct-text">${(pct*100).toFixed(0)}%</span>
      </div>`;

    return `<div class="team-row${isActive ? ' active' : ''}" style="grid-template-columns:${grid}" onclick="showDetail('${r.sec.replace(/'/g,"\'")}')">
      <div class="team-name">${withFlag(r.sec)}</div>
      <div class="team-count">${r.total}</div>
      ${bothCols}
    </div>`;
  }).join('');

  // Grand total
  const all = sectionOrder.map(sec => getStats(sec));
  const gt = all.reduce((acc, r) => ({ total: acc.total+r.total, us: acc.us+r.us, mx: acc.mx+r.mx }), {total:0,us:0,mx:0});
  const gtEl = document.getElementById('grandTotal');
  gtEl.style.gridTemplateColumns = grid;
  if (col === 'both') {
    gtEl.innerHTML = `<span>GRAND TOTAL</span><span>${gt.total}</span><span>${gt.us}</span><span>${gt.mx}</span>
      <span style="font-size:11px;text-align:center">${(gt.us/gt.total*100).toFixed(1)}% 🇺🇸</span>
      <span style="font-size:11px;text-align:center">${(gt.mx/gt.total*100).toFixed(1)}% 🇲🇽</span>`;
  } else if (col === 'us') {
    gtEl.innerHTML = `<span>GRAND TOTAL</span><span>${gt.total}</span><span>${gt.us}</span>
      <span style="font-size:11px;text-align:center">${(gt.us/gt.total*100).toFixed(1)}% 🇺🇸</span>`;
  } else {
    gtEl.innerHTML = `<span>GRAND TOTAL</span><span>${gt.total}</span><span>${gt.mx}</span>
      <span style="font-size:11px;text-align:center">${(gt.mx/gt.total*100).toFixed(1)}% 🇲🇽</span>`;
  }

  // Header stats
  const missing = col === 'mx' ? gt.total - gt.mx : gt.total - gt.us;
  const collected = col === 'mx' ? gt.mx : gt.us;
  const flag = col === 'mx' ? '🇲🇽' : '🇺🇸';
  document.getElementById('headerStats').innerHTML = col === 'both' ? `
    <div style="display:flex;gap:20px">
      <div class="detail-stat"><div class="stat">${gt.us}</div><div class="stat-label">🇺🇸 Collected</div></div>
      <div class="detail-stat"><div class="stat">${gt.mx}</div><div class="stat-label">🇲🇽 Collected</div></div>
      <div class="detail-stat"><div class="stat">${gt.total - gt.us}</div><div class="stat-label">🇺🇸 Missing</div></div>
    </div>` : `
    <div style="display:flex;gap:20px">
      <div class="detail-stat"><div class="stat">${collected}</div><div class="stat-label">${flag} Collected</div></div>
      <div class="detail-stat"><div class="stat">${missing}</div><div class="stat-label">${flag} Missing</div></div>
      <div class="detail-stat"><div class="stat">${(collected/gt.total*100).toFixed(1)}%</div><div class="stat-label">${flag} Complete</div></div>
    </div>`;
}

function showDetail(sec) {
  activeSection = sec;
  renderSummary();

  const items = sections[sec] || [];
  const stats = getStats(sec);
  const pctUs = stats.total ? (stats.us/stats.total*100).toFixed(0) : 0;
  const pctMx = stats.total ? (stats.mx/stats.total*100).toFixed(0) : 0;

  const col = currentCollection;
  const detailStats = col === 'both' ? `
    <div class="detail-stat"><div class="val">${stats.total}</div><div class="lbl">Total</div></div>
    <div class="detail-stat"><div class="val">${stats.us}/${stats.total}</div><div class="lbl">🇺🇸 US (${pctUs}%)</div></div>
    <div class="detail-stat"><div class="val">${stats.mx}/${stats.total}</div><div class="lbl">🇲🇽 MX (${pctMx}%)</div></div>
    <div class="detail-stat"><div class="val">${stats.total - stats.us}</div><div class="lbl">🇺🇸 Missing</div></div>` :
    col === 'us' ? `
    <div class="detail-stat"><div class="val">${stats.total}</div><div class="lbl">Total</div></div>
    <div class="detail-stat"><div class="val">${stats.us}/${stats.total}</div><div class="lbl">🇺🇸 Collected (${pctUs}%)</div></div>
    <div class="detail-stat"><div class="val">${stats.total - stats.us}</div><div class="lbl">🇺🇸 Missing</div></div>` : `
    <div class="detail-stat"><div class="val">${stats.total}</div><div class="lbl">Total</div></div>
    <div class="detail-stat"><div class="val">${stats.mx}/${stats.total}</div><div class="lbl">🇲🇽 Collected (${pctMx}%)</div></div>
    <div class="detail-stat"><div class="val">${stats.total - stats.mx}</div><div class="lbl">🇲🇽 Missing</div></div>`;

  const panel = document.getElementById('detailPanel');
  panel.innerHTML = `
    <div class="detail-header">
      <h2>${withFlag(sec)}</h2>
      <div class="detail-stats">${detailStats}</div>
    </div>
    <div class="sticker-grid">
      ${items.map(s => {
        const collected = col === 'mx' ? s.mx : col === 'us' ? s.usa : s.usa;
        const cardClass = col === 'mx'
          ? (s.mx ? ' collected-mx' : '')
          : col === 'us'
          ? (s.usa ? ' collected-us' : '')
          : (s.usa && s.mx ? ' collected-both' : s.usa ? ' collected-us' : s.mx ? ' collected-mx' : '');
        const badges = col === 'both'
          ? `<span class="badge us${s.usa ? ' have' : ''}">${s.usa ? '✓ US' : 'US'}</span><span class="badge mx${s.mx ? ' have' : ''}">${s.mx ? '✓ MX' : 'MX'}</span>`
          : col === 'us'
          ? `<span class="badge us${s.usa ? ' have' : ''}">${s.usa ? '✓' : '✗'}</span>`
          : `<span class="badge mx${s.mx ? ' have' : ''}">${s.mx ? '✓' : '✗'}</span>`;
        const thumbKey = normalizeName(s.desc);
        const thumbSrc = s.section === 'Croatia' && CROATIA_THUMBS[thumbKey] ? CROATIA_THUMBS[thumbKey] : null;
        const thumbHtml = thumbSrc ? `<img class="sticker-thumb" src="${thumbSrc}" alt="${s.desc}">` : '';
        return `<div class="sticker-card${cardClass}">
          <div class="sticker-num">${s.id}</div>
          ${thumbHtml}
          <div class="sticker-desc">${s.desc}</div>
          <div class="sticker-badges">${badges}</div>
        </div>`;
      }).join('')}
    </div>`;

  panel.scrollTop = 0;
}

function renderDupes() {
  const col = currentCollection;
  const usList = DUPES.us;
  const mxList = DUPES.mx;

  const showUs = col !== 'mx';
  const showMx = col !== 'us';
  const filteredUs = showUs ? usList : [];
  const filteredMx = showMx ? mxList : [];
  const total = filteredUs.length + filteredMx.length;

  if (!total) {
    document.getElementById('dupesContent').innerHTML = '<div style="text-align:center;color:#aaa;margin-top:60px;font-size:15px;">No duplicate stickers found.</div>';
    return;
  }

  const getFlag = name => { const m = name.match(/.*\(([^)]+)\)/); if (!m) return ''; const c = m[1].replace(/\s*\d+\s*/g,'').trim(); return FLAGS[c] || FLAGS[m[1]] || ''; };
  const colHtml = (items, label, bgHeader, bgBadge) => {
    if (!items.length) return `<div style="flex:1;"><div style="font-size:13px;font-weight:700;padding:10px 14px;border-radius:6px 6px 0 0;background:${bgHeader};color:#fff;margin-bottom:0;">${label} — ${items.length} duplicate${items.length!==1?'s':''}</div><div style="background:#fff;border:1px solid #e0e0e0;border-top:none;border-radius:0 0 6px 6px;padding:16px;color:#aaa;font-size:12px;text-align:center;">No duplicates</div></div>`;
    const rows = items.map(name => `<div style="padding:8px 14px;border-bottom:1px solid #f0f0f0;font-size:12px;display:flex;align-items:center;gap:8px;"><span style="background:${bgBadge};color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;flex-shrink:0;">×2</span><span style="font-size:15px;">${getFlag(name)}</span>${name}</div>`).join('');
    return `<div style="flex:1;"><div style="font-size:13px;font-weight:700;padding:10px 14px;border-radius:6px 6px 0 0;background:${bgHeader};color:#fff;">${label} — ${items.length} duplicate${items.length!==1?'s':''}</div><div style="background:#fff;border:1px solid #e0e0e0;border-top:none;border-radius:0 0 6px 6px;">${rows}</div></div>`;
  };

  let html = `<h2 style="font-size:16px;font-weight:700;color:#1a1a2e;margin-bottom:16px;">🔁 Duplicate Stickers</h2>
  <div style="display:flex;gap:20px;align-items:flex-start;">
    ${showUs ? colHtml(filteredUs, '🇺🇸 US', '#1565c0', '#1565c0') : ''}
    ${showMx ? colHtml(filteredMx, '🇲🇽 MX', '#2e7d32', '#2e7d32') : ''}
  </div>`;

  document.getElementById('dupesContent').innerHTML = html;
}


function renderCoca() {
  const getFlag = name => { const m = name.match(/.*\(([^)]+)\)/); if (!m) return ''; const c = m[1].replace(/\s*\d+\s*/g,'').trim(); return FLAGS[c] || FLAGS[m[1]] || ''; };

  const colHtml = (items, label, accentColor) => {
    const collected = items.filter(p => p.have).length;
    const rows = items.map(p => {
      const statusBadge = p.have
        ? `<span style="background:#fff;color:#F40009;font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;border:1.5px solid #F40009;white-space:nowrap;">✓ Got it</span>`
        : `<span style="background:rgba(255,255,255,0.15);color:#fff;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;border:1.5px solid rgba(255,255,255,0.4);white-space:nowrap;">✗ Missing</span>`;
      const rowBg = p.have ? 'rgba(255,255,255,0.12)' : 'transparent';
      return `<div style="padding:10px 16px;border-bottom:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;gap:10px;background:${rowBg};">
        <span style="font-size:18px;flex-shrink:0;">${getFlag(p.name)}</span>
        <span style="font-size:13px;color:#fff;flex:1;font-weight:${p.have ? '600' : '400'};">${p.name}</span>
        ${statusBadge}
      </div>`;
    }).join('');

    const pct = Math.round(collected / items.length * 100);
    return `<div style="flex:1;border-radius:10px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,0.25);">
      <div style="background:#F40009;padding:14px 16px;">
        <div style="font-size:14px;font-weight:800;color:#fff;letter-spacing:0.5px;">${label}</div>
        <div style="display:flex;align-items:center;gap:10px;margin-top:8px;">
          <div style="flex:1;height:6px;background:rgba(255,255,255,0.25);border-radius:3px;overflow:hidden;">
            <div style="width:${pct}%;height:100%;background:#fff;border-radius:3px;"></div>
          </div>
          <span style="font-size:12px;color:rgba(255,255,255,0.9);font-weight:700;white-space:nowrap;">${collected}/${items.length} collected</span>
        </div>
      </div>
      <div style="background:#CC0000;">${rows}</div>
    </div>`;
  };

  const totalUs = COCA_COLA.us.filter(p => p.have).length;
  const totalMx = COCA_COLA.mx.filter(p => p.have).length;

  const html = `
    <div style="background:linear-gradient(135deg,#F40009,#8B0000);padding:20px 24px;border-radius:12px;margin-bottom:24px;display:flex;align-items:center;gap:16px;box-shadow:0 4px 20px rgba(244,0,9,0.3);">
      <span style="font-size:36px;">🥤</span>
      <div>
        <div style="font-size:20px;font-weight:900;color:#fff;letter-spacing:1px;font-style:italic;">Coca‑Cola Exchange</div>
        <div style="font-size:12px;color:rgba(255,255,255,0.75);margin-top:2px;">Stickers to find for the trade</div>
      </div>
      <div style="margin-left:auto;display:flex;gap:20px;">
        <div style="text-align:center;">
          <div style="font-size:22px;font-weight:800;color:#fff;">${totalUs}/${COCA_COLA.us.length}</div>
          <div style="font-size:11px;color:rgba(255,255,255,0.7);">🇺🇸 US</div>
        </div>
        <div style="text-align:center;">
          <div style="font-size:22px;font-weight:800;color:#fff;">${totalMx}/${COCA_COLA.mx.length}</div>
          <div style="font-size:11px;color:rgba(255,255,255,0.7);">🇲🇽 MX</div>
        </div>
      </div>
    </div>
    <div style="display:flex;gap:20px;align-items:flex-start;">
      ${colHtml(COCA_COLA.us, '🇺🇸 US Collection', '#F40009')}
      ${colHtml(COCA_COLA.mx, '🇲🇽 MX Collection', '#F40009')}
    </div>`;

  document.getElementById('cocaContent').innerHTML = html;
}


renderSummary();
</script>
</body>
</html>
